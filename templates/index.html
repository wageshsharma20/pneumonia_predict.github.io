<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumonia Prediction System</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --background: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--background);
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        input, select {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #004494;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Loader CSS */
        .hidden {
            display: none !important;
        }

        #loader {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Result Box Styling */
        #result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-high-risk {
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            color: #c62828;
        }

        .result-low-risk {
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
        }

        #prediction-text {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .confidence {
            font-weight: bold;
            font-size: 15px;
        }

        .explanation {
            font-size: 12px;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* Mobile Responsiveness */
        @media (max-width: 500px) {
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Pneumonia Prediction System</h1>
                <p class="subtitle">Enter patient clinical metrics for automated screening.</p>
            </div>

            <form id="prediction-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Fever:</label>
                        <select id="fever" required>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tachycardia:</label>
                        <select id="tachycardia" required>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Crackles (Lung Sounds):</label>
                        <select id="crackles" required>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Oxygen Saturation (SpO2 %):</label>
                        <input type="number" id="oxygen_saturation" step="0.1" min="0" max="100" placeholder="e.g. 94.5" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>WBC Count (10^9/L):</label>
                        <input type="number" id="wbc_count" step="0.1" min="0" placeholder="e.g. 7.5" required>
                    </div>
                    <div class="form-group">
                        <label>Chest X-Ray Result:</label>
                        <select id="xray_result" required>
                            <option value="normal">Normal</option>
                            <option value="consolidation">Consolidation</option>
                            <option value="effusion">Effusion</option>
                            <option value="infiltrate">Infiltrate</option>
                            <option value="opacities">Opacities</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submit-btn">Run Prediction</button>
            </form>

            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing clinical data...</p>
            </div>

            <div id="result-box" class="hidden">
                <h2 id="prediction-text"></h2>
                <p id="probability-text" class="confidence"></p>
                <p class="explanation"><em>*Note: This system uses a safety-first decision threshold (0.35) prioritized for clinical screening to minimize false negatives.</em></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('prediction-form').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result-box').classList.add('hidden');

            const formData = {
                fever: document.getElementById('fever').value,
                tachycardia: document.getElementById('tachycardia').value,
                crackles: document.getElementById('crackles').value,
                oxygen_saturation: document.getElementById('oxygen_saturation').value,
                wbc_count: document.getElementById('wbc_count').value,
                xray_result: document.getElementById('xray_result').value
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const result = await response.json();

                if (result.success) {
                    const resultBox = document.getElementById('result-box');
                    resultBox.classList.remove('hidden');
                    
                    if(result.is_high_risk) {
                        resultBox.className = 'result-high-risk';
                    } else {
                        resultBox.className = 'result-low-risk';
                    }

                    document.getElementById('prediction-text').innerText = result.prediction;
                    document.getElementById('probability-text').innerText = `Model Confidence / Probability: ${result.probability}`;
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Connection Error. Make sure the Flask server is running.');
            } finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('submit-btn').style.display = 'block';
            }
        });
    </script>
</body>
</html>
