<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pneumonia Prediction System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #2a5298;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .high {
            background: #ffe5e5;
            color: #c0392b;
        }

        .low {
            background: #e6ffe6;
            color: #27ae60;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Pneumonia Prediction System</h2>
    <p>Enter patient clinical metrics</p>

    <label>Fever</label>
    <select id="fever">
        <option>Yes</option>
        <option>No</option>
    </select>

    <label>Tachycardia</label>
    <select id="tachycardia">
        <option>Yes</option>
        <option>No</option>
    </select>

    <label>Crackles</label>
    <select id="crackles">
        <option>Yes</option>
        <option>No</option>
    </select>

    <label>Oxygen Saturation (SpO2 %)</label>
    <input type="number" id="oxygen_saturation" step="0.1">

    <label>WBC Count (10^9/L)</label>
    <input type="number" id="wbc_count" step="0.1">

    <label>Chest X-Ray Result</label>
    <select id="xray_result">
        <option>Normal</option>
        <option>Consolidation</option>
        <option>Effusion</option>
    </select>

    <button onclick="predict()">Predict</button>

    <div id="resultBox" class="result"></div>
</div>

<script>
async function predict() {

    const data = {
        fever: document.getElementById("fever").value,
        tachycardia: document.getElementById("tachycardia").value,
        crackles: document.getElementById("crackles").value,
        oxygen_saturation: document.getElementById("oxygen_saturation").value,
        wbc_count: document.getElementById("wbc_count").value,
        xray_result: document.getElementById("xray_result").value
    };

    const response = await fetch('/predict', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    const box = document.getElementById("resultBox");

    if (result.success) {
        box.style.display = "block";

        if (result.prediction.includes("High")) {
            box.className = "result high";
        } else {
            box.className = "result low";
        }

        box.innerHTML = `
            ${result.prediction} <br>
            Probability: ${result.probability}
        `;
    } else {
        alert("Error: " + result.error);
    }
}
</script>

</body>
</html>
